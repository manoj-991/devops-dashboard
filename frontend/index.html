<!DOCTYPE html>
<html>

<head>

    <title>DevOps Dashboard</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

    <div class="dashboard">

        <!-- HEADER -->

        <div class="header">

            <div class="logo">

                🖥️ DevOps Dashboard

            </div>

            <div class="header-actions">

                <span>Dark Mode</span>

                <label class="switch">

                    <input type="checkbox" id="themeToggle">

                    <span class="slider"></span>

                </label>

            </div>

        </div>

        <!-- TOP METRICS -->

        <div class="metrics-grid">

            <div class="metric-card">

                <div class="metric-title">
                    Status
                </div>

                <div class="metric-value green" id="health"></div>

                <div class="metric-sub">
                    All systems operational
                </div>

            </div>

            <div class="metric-card">

                <div class="metric-title">
                    CPU Usage
                </div>

                <div class="metric-value blue" id="cpu"></div>

                <div class="progress-bar">

                    <div id="cpuBar" class="progress-fill blue-fill"></div>

                </div>

            </div>

            <div class="metric-card">

                <div class="metric-title">
                    RAM Usage
                </div>

                <div class="metric-value purple" id="ram"></div>

                <div class="progress-bar">

                    <div id="ramBar" class="progress-fill purple-fill"></div>

                </div>

            </div>

            <div class="metric-card">

                <div class="metric-title">
                    Disk Usage
                </div>

                <div class="metric-value green" id="disk"></div>

                <div class="progress-bar">

                    <div id="diskBar" class="progress-fill green-fill"></div>

                </div>

            </div>

            <div class="metric-card">

                <div class="metric-title">
                    Uptime
                </div>

                <div class="metric-value orange" id="uptime"></div>

            </div>

        </div>

        <!-- CONTAINERS -->

        <div class="containers-grid">

            <div class="card">

                <div class="card-header">

                    📦 Docker Containers

                </div>

                <div class="table-wrapper">

                    <table>

                        <thead>

                            <tr>
                                <th>CONTAINER</th>
                                <th>STATUS</th>
                                <th>PORTS</th>
                            </tr>

                        </thead>

                        <tbody id="docker">

                        </tbody>

                    </table>

                </div>

            </div>

            <div class="card">

                <div class="card-header">

                    📊 Container Metrics

                </div>

                <div class="table-wrapper">

                    <table>

                        <thead>

                            <tr>
                                <th>CONTAINER</th>
                                <th>CPU</th>
                                <th>MEMORY</th>
                            </tr>

                        </thead>

                        <tbody id="containerStats">

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

        <!-- CHARTS -->

        <div class="charts-grid">

            <div class="card">

                <div class="card-header">

                    📈 CPU History

                </div>

                <canvas id="cpuChart"></canvas>

            </div>

            <div class="card">

                <div class="card-header">

                    📈 RAM History

                </div>

                <canvas id="ramChart"></canvas>

            </div>

        </div>

        <!-- LOWER -->

        <div class="system-grid">

            <div class="card">

                <div class="card-header">

                    ⚙ Processes

                </div>

                <div class="table-wrapper" id="processes"></div>

            </div>

            <div class="card">

                <div class="card-header">

                    🌐 Network & Ports

                </div>

                <div id="network"></div>

                <br>

                <div id="ports"></div>

            </div>

            <div class="card">

                <div class="card-header">

                    ℹ System Info & Services

                </div>

                <div id="system"></div>

                <br>

                <div id="services"></div>

            </div>

        </div>

        <!-- LOGS -->

        <div class="logs-grid">

            <div class="card">

                <div class="card-header">

                    💻 Live Logs

                </div>

                <div class="logs-box" id="logs"></div>

            </div>

            <div class="card">

                <div class="card-header">

                    🛡 Audit Logs

                </div>

                <div class="logs-box" id="auditLogs"></div>

            </div>

        </div>

    </div>

    <script src="app.js"></script>

</body>

</html>
