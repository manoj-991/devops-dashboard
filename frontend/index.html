<!DOCTYPE html>
<html>

<head>

    <title>DevOps Dashboard</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

    <h1>DevOps Dashboard</h1>

    <div id="alerts"></div>

    <div class="dashboard">

        <div class="card">
            <h2>Backend Status</h2>
            <div class="metric" id="health"></div>
        </div>

        <div class="card">
            <h2>Server Uptime</h2>
            <div class="metric" id="uptime"></div>
        </div>

        <div class="card">
            <h2>CPU Usage</h2>
            <div class="metric" id="cpu"></div>
        </div>

        <div class="card">
            <h2>RAM Usage</h2>
            <div class="metric" id="ram"></div>
        </div>

        <div class="card">
            <h2>Disk Usage</h2>
            <div class="metric" id="disk"></div>
        </div>

        <div class="card">
            <h2>Network Traffic</h2>
            <div id="network"></div>
        </div>

        <div class="card">
            <h2>System Info</h2>
            <div id="system"></div>
        </div>

        <div class="card">
            <h2>Services</h2>
            <div id="services"></div>
        </div>

        <div class="card">
            <h2>Open Ports</h2>
            <div id="ports"></div>
        </div>

        <div class="card">
            <h2>Last Refresh</h2>
            <div id="lastUpdated"></div>
        </div>

        <div class="card">
            <h2>Top Processes</h2>
            <div id="processes"></div>
        </div>

        <div class="card">
            <h2>Docker Containers</h2>

            <div id="docker" class="container-list">
            </div>
        </div>

        <div class="card">
            <h2>Container Metrics</h2>

            <div id="containerStats">
            </div>
        </div>

        <div class="card chart-container">
            <h2>CPU History</h2>

            <canvas id="cpuChart"></canvas>
        </div>

        <div class="card chart-container">
            <h2>RAM History</h2>

            <canvas id="ramChart"></canvas>
        </div>

        <div class="card" style="grid-column:1/-1;">

            <h2>Live Logs</h2>

            <div id="logs" class="logs-box">
            </div>

        </div>

    </div>

    <div class="modal" id="logModal">

        <div class="modal-content">

            <div class="modal-header">

                <h2>Container Logs</h2>

                <button class="close-btn" onclick="closeModal()">

                    Close

                </button>

            </div>

            <div id="modalLogs" class="modal-logs">
            </div>

        </div>

    </div>

    <script src="app.js"></script>
    <div class="card" style="grid-column:1/-1;">

        <h2>
            Audit Logs
        </h2>

        <div id="auditLogs" class="logs-box">
        </div>

    </div>

</body>

</html>
