name: DevOps Dashboard CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-push:

    permissions:
      contents: write

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install Dependencies
        run: go mod tidy

      - name: Run Tests
        run: go test ./...

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t manoja2982/devops-dashboard:${{ github.run_number }} .

      - name: Push Docker Image
        run: |
          docker push manoja2982/devops-dashboard:${{ github.run_number }}

      - name: Update Helm Values
        run: |
          sed -i 's/tag:.*/tag: "${{ github.run_number }}"/g' devops-dashboard-chart/values.yaml

      - name: Commit Updated Helm Tag
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"

          git add .
          git commit -m "Updated image tag to ${{ github.run_number }}" || echo "No changes"

          git push