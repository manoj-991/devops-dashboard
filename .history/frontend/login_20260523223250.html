<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <style>
        body {

            font-family: Arial;

            display: flex;

            justify-content: center;

            align-items: center;

            height: 100vh;

            background:
                linear-gradient(135deg,
                    #1e293b,
                    #0f172a);
        }

        .login-box {

            background:
                rgba(255, 255, 255, 0.1);

            backdrop-filter: blur(15px);

            padding: 40px;

            border-radius: 20px;

            width: 320px;

            color: white;
        }

        input {

            width: 100%;

            padding: 12px;

            margin-top: 15px;

            border: none;

            border-radius: 10px;
        }

        button {

            width: 100%;

            margin-top: 20px;

            padding: 12px;

            border: none;

            border-radius: 10px;

            background: #2563eb;

            color: white;

            cursor: pointer;
        }
    </style>

</head>

<body>

    <div class="login-box">

        <h1>DevOps Dashboard</h1>

        <input type="text" id="username" placeholder="Username">

        <input type="password" id="password" placeholder="Password">

        <button onclick="login()">
            Login
        </button>

    </div>

    <script>

        async function login() {

            const username =
                document.getElementById(
                    "username"
                ).value;

            const password =
                document.getElementById(
                    "password"
                ).value;

            const response = await fetch(
                "/api/login",
                {
                    method: "POST",

                    headers: {
                        "Content-Type":
                            "application/json"
                    },

                    body: JSON.stringify({
                        username,
                        password
                    })
                }
            );

            if (response.ok) {

                window.location.href =
                    "/frontend/index.html";

            } else {

                alert("Invalid login");
            }
        }

    </script>

</body>

</html>
