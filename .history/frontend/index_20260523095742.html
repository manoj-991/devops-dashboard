<!DOCTYPE html>
<html>

<head>

    <title>DevOps Dashboard</title>

    <link rel="stylesheet" href="/frontend/style.css">

</head>

<body>

    <h1>DevOps Dashboard</h1>

    <div class="dashboard">

        <div class="card">
            <h2>Backend Status</h2>
            <p id="backend-status">Loading...</p>
        </div>

        <div class="card">
            <h2>Server Uptime</h2>
            <p id="uptime-result">Loading...</p>
        </div>

        <div class="card">
            <h2>CPU Usage</h2>
            <p id="cpu-result">Loading...</p>
        </div>

        <div class="card">
            <h2>RAM Usage</h2>
            <p id="ram-result">Loading...</p>
        </div>

        <div class="card">
            <h2>Disk Usage</h2>
            <p id="disk-result">Loading...</p>
        </div>

        <div class="card">
            <h2>System Info</h2>
            <div class="card">

                <h2>Top Processes</h2>

                <div id="process-result">
                    Loading...
                </div>

            </div>

            <p id="system-result">
                Loading...
            </p>
        </div>

    </div>

    <script src="/frontend/app.js"></script>

</body>

</html>
