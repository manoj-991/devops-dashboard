apiVersion: apps/v1
kind: Deployment

metadata:
  name: {{ include "devops-dashboard-chart.fullname" . }}

spec:
  replicas: 1

  selector:
    matchLabels:
      app.kubernetes.io/name: devops-dashboard-chart
      app.kubernetes.io/instance: devops-dashboard

  template:
    metadata:
      labels:
        app.kubernetes.io/name: devops-dashboard-chart
        app.kubernetes.io/instance: devops-dashboard

    spec:
      containers:
        - name: devops-dashboard
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: Always

          ports:
            - containerPort: 9090

          volumeMounts:
            - name: docker-sock
              mountPath: /var/run/docker.sock

      volumes:
        - name: docker-sock
          hostPath:
            path: /var/run/docker.sock